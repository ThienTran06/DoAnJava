<div class="page-shell page-transition active">
  <div class="header-row" style="margin-bottom:18px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px">
    <div>
      <div style="font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:4px">Chăm sóc khách hàng</div>
      <div style="font-size:13px;color:var(--muted)">Quản lý đánh giá và phản hồi</div>
    </div>
  </div>

  <div class="stats-grid" style="grid-template-columns:repeat(4,1fr); display:grid; gap:12px; margin-bottom:18px">
    <div class="stat-card">
      <div class="stat-value" id="statsTotal">0</div>
      <div class="stat-label">Tổng đánh giá</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statsPending">0</div>
      <div class="stat-label">Chờ duyệt</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statsApproved">0</div>
      <div class="stat-label">Đã duyệt</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statsFiveStars">0</div>
      <div class="stat-label">Đánh giá 5 sao</div>
    </div>
  </div>

  <div class="filter-bar" style="display:flex; gap:12px; margin-bottom:16px; align-items:center; flex-wrap:wrap; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:12px 18px">
    <div style="display:flex; flex-direction:column; gap:4px">
      <span style="font-size:11px; font-weight:700; color:var(--text-subtle, #b5b5ae); text-transform:uppercase">Lọc theo loại</span>
      <select id="filterLoai">
        <option value="ALL">Tất cả</option>
        <option value="SACH">Sách</option>
        <option value="DICH_VU">Dịch vụ</option>
      </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px">
      <span style="font-size:11px; font-weight:700; color:var(--text-subtle, #b5b5ae); text-transform:uppercase">Lọc theo trạng thái</span>
      <select id="filterTrangThai">
        <option value="ALL">Tất cả</option>
        <option value="CHO_DUYET">Chờ duyệt</option>
        <option value="DA_DUYET">Đã duyệt</option>
      </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px">
      <span style="font-size:11px; font-weight:700; color:var(--text-subtle, #b5b5ae); text-transform:uppercase">Lọc theo sao</span>
      <select id="filterSao">
        <option value="ALL">Tất cả</option>
        <option value="5">5 sao</option>
        <option value="4">4 sao</option>
        <option value="3">3 sao</option>
        <option value="2">2 sao</option>
        <option value="1">1 sao</option>
      </select>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table class="tbl-books">
        <thead>
          <tr>
            <th style="width:60px">STT</th>
            <th>Khách hàng</th>
            <th style="width:100px">Loại</th>
            <th>Sách</th>
            <th style="width:120px">Sao</th>
            <th>Nội dung / Phản hồi</th>
            <th style="width:120px">Trạng thái</th>
            <th style="width:140px">Ngày</th>
            <th style="width:200px">Thao tác</th>
          </tr>
        </thead>
        <tbody id="cskhTableBody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="cskhEmptyState" style="display:none; margin-top:16px">Chưa có đánh giá nào phù hợp bộ lọc.</div>
  </div>

  <!-- Modal Reply -->
  <div class="modal-overlay" id="replyModal">
    <div class="modal" style="max-width:480px">
      <div class="modal-head">
        <div class="modal-title">Phản hồi đánh giá</div>
        <button class="close" id="closeReplyModal">Đóng</button>
      </div>
      <form id="replyForm">
        <input type="hidden" id="replyReviewId">
        <div class="modal-body">
          <div class="field" style="display:flex; flex-direction:column; gap:6px">
            <div class="label">Nội dung phản hồi</div>
            <textarea class="textarea" id="replyTextarea" required placeholder="Nhập nội dung phản hồi tại đây..." style="width:100%; min-height:120px; font-family:inherit; padding:8px; border:1.5px solid var(--border); border-radius:8px; resize:vertical; background:var(--surface); color:var(--text); outline:none"></textarea>
          </div>
        </div>
        <div class="footer-actions">
          <button type="button" class="btn ghost" id="cancelReplyBtn">Hủy</button>
          <button type="submit" class="btn primary" id="submitReplyBtn">Gửi phản hồi</button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .badge-cskh {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
    text-align: center;
  }
  .badge-cskh.pending {
    background: #fef9e7;
    color: #b7950b;
    border: 1px solid rgba(183,149,11,0.2);
  }
  html[data-theme="dark"] .badge-cskh.pending {
    background: #3e3312;
    color: #f4d03f;
    border: 1px solid rgba(244,208,63,0.2);
  }
  .badge-cskh.approved {
    background: #e8f5eb;
    color: #3a7d44;
    border: 1px solid rgba(58,125,68,0.2);
  }
  html[data-theme="dark"] .badge-cskh.approved {
    background: #12351b;
    color: #62d071;
    border: 1px solid rgba(98,208,113,0.2);
  }
  .star-gold {
    color: #f1c40f;
    font-size: 15px;
    letter-spacing: 1px;
  }
  .star-gray {
    color: var(--text-subtle, #b5b5ae);
    font-size: 15px;
    letter-spacing: 1px;
  }
</style>

<script>
window.initCSKH = function() {
  const state = {
    items: []
  };

  const API_BASE = window.API_BASE_URL || window.location.origin;
  const REVIEW_API = `${API_BASE}/api/danh-gia`;

  const getAuthHeaders = () => {
    const token = localStorage.getItem('token')
      || sessionStorage.getItem('token')
      || window.localStorage.token
      || window.sessionStorage.token;
    return token ? { Authorization: `Bearer ${token}` } : {};
  };

  const mapReview = (item) => ({
    id: item?.id,
    khachHangName: item?.khachHang?.hoTen || 'Khách ẩn danh',
    sachName: item?.sach?.tenSach || '—',
    diemSao: item?.diemSao ?? 0,
    noiDung: item?.noiDung || '',
    hinhAnh: item?.hinhAnh || '',
    loai: item?.loai || 'SACH',
    trangThai: item?.trangThai || 'CHO_DUYET',
    reply: item?.reply || '',
    createdAt: item?.createdAt || null
  });

  const renderLoadingState = () => {
    const tbody = document.getElementById('cskhTableBody');
    if (tbody) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">Đang tải danh sách đánh giá...</div></td></tr>`;
    }
  };

  const loadReviews = async () => {
    renderLoadingState();
    try {
      const response = await fetch(REVIEW_API, {
        headers: {
          Accept: 'application/json',
          ...getAuthHeaders(),
        },
      });

      if (response.status === 401) {
        window.location.href = 'login.html';
        return;
      }

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      state.items = Array.isArray(data) ? data.map(mapReview) : [];
      render();
    } catch (error) {
      const tbody = document.getElementById('cskhTableBody');
      if (tbody) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">Không thể tải danh sách đánh giá từ backend: ${error.message}</div></td></tr>`;
      }
    }
  };

  const calculateStats = () => {
    const total = state.items.length;
    const pending = state.items.filter(x => x.trangThai === 'CHO_DUYET').length;
    const approved = state.items.filter(x => x.trangThai === 'DA_DUYET').length;
    const fiveStars = state.items.filter(x => x.diemSao === 5).length;

    const statsTotalEl = document.getElementById('statsTotal');
    const statsPendingEl = document.getElementById('statsPending');
    const statsApprovedEl = document.getElementById('statsApproved');
    const statsFiveStarsEl = document.getElementById('statsFiveStars');

    if (statsTotalEl) statsTotalEl.textContent = total;
    if (statsPendingEl) statsPendingEl.textContent = pending;
    if (statsApprovedEl) statsApprovedEl.textContent = approved;
    if (statsFiveStarsEl) statsFiveStarsEl.textContent = fiveStars;
  };


  const renderReviewImages = (hinhAnh) => {
    const urls = String(hinhAnh || '').split(',').map(x => x.trim()).filter(Boolean);
    if (!urls.length) return '';
    return `<div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px">${urls.map(url =>
      `<img class="js-review-image" src="${escapeHtml(url)}" data-full="${escapeHtml(url)}" style="width:64px; height:64px; object-fit:cover; border-radius:6px; border:1.5px solid var(--border); cursor:zoom-in" alt="?nh ??nh gi?">`
    ).join('')}</div>`;
  };

  const renderStars = (diemSao) => {
    let starsHtml = '';
    for (let i = 1; i <= 5; i++) {
      if (i <= diemSao) {
        starsHtml += '<span class="star-gold">★</span>';
      } else {
        starsHtml += '<span class="star-gray">☆</span>';
      }
    }
    return starsHtml;
  };

  const render = () => {
    const filterLoaiEl = document.getElementById('filterLoai');
    const filterTrangThaiEl = document.getElementById('filterTrangThai');
    const filterSaoEl = document.getElementById('filterSao');

    const filterLoaiVal = filterLoaiEl ? filterLoaiEl.value : 'ALL';
    const filterTrangThaiVal = filterTrangThaiEl ? filterTrangThaiEl.value : 'ALL';
    const filterSaoVal = filterSaoEl ? filterSaoEl.value : 'ALL';

    const filtered = state.items.filter(item => {
      const matchLoai = filterLoaiVal === 'ALL' || item.loai === filterLoaiVal;
      const matchTrangThai = filterTrangThaiVal === 'ALL' || item.trangThai === filterTrangThaiVal;
      const matchSao = filterSaoVal === 'ALL' || String(item.diemSao) === filterSaoVal;
      return matchLoai && matchTrangThai && matchSao;
    });

    calculateStats();

    const tbody = document.getElementById('cskhTableBody');
    const emptyState = document.getElementById('cskhEmptyState');
    if (!tbody) return;

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      if (emptyState) emptyState.style.display = 'block';
      return;
    }

    if (emptyState) emptyState.style.display = 'none';
    tbody.innerHTML = filtered.map((item, idx) => {
      const formattedDate = item.createdAt 
        ? new Date(item.createdAt).toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) 
        : '—';

      const typeBadge = item.loai === 'SACH' 
        ? '<span class="badge" style="background:var(--bg); border:1px solid var(--border)">Sách</span>'
        : '<span class="badge" style="background:var(--bg); border:1px solid var(--border)">Dịch vụ</span>';

      const statusBadge = item.trangThai === 'CHO_DUYET'
        ? '<span class="badge-cskh pending">Chờ duyệt</span>'
        : '<span class="badge-cskh approved">Đã duyệt</span>';
      return `
        <tr>
          <td>${idx + 1}</td>
          <td style="font-weight:700">${escapeHtml(item.khachHangName)}</td>
          <td>${typeBadge}</td>
          <td style="max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${escapeHtml(item.sachName)}">${escapeHtml(item.sachName)}</td>
          <td>${renderStars(item.diemSao)}</td>
          <td>
            <div style="font-weight:500; max-width:320px; overflow-wrap:anywhere">${escapeHtml(item.noiDung)}</div>
            ${renderReviewImages(item.hinhAnh)}
            ${item.reply ? `<div style="font-size:12px; color:var(--muted); margin-top:6px; padding:6px 10px; border-left:3.5px solid var(--border); background:var(--bg); border-radius:4px; max-width:320px; overflow-wrap:anywhere"><strong>Phản hồi:</strong> ${escapeHtml(item.reply)}</div>` : ''}
          </td>
          <td>${statusBadge}</td>
          <td style="color:var(--muted)">${formattedDate}</td>
          <td>
            <div class="ops" style="display:flex; align-items:center; gap:8px">
              <button class="link js-reply-review" data-id="${item.id}" data-reply="${escapeHtml(item.reply)}">Reply</button>
              <button class="link danger js-xoa-review" data-id="${item.id}">Xóa</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  };

  function escapeHtml(value) {
    if (!value) return '';
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  // Bind change listeners to dropdown filters
  const filterLoai = document.getElementById('filterLoai');
  const filterTrangThai = document.getElementById('filterTrangThai');
  const filterSao = document.getElementById('filterSao');

  if (filterLoai) filterLoai.onchange = render;
  if (filterTrangThai) filterTrangThai.onchange = render;
  if (filterSao) filterSao.onchange = render;

  // Modal handler setup
  const modal = document.getElementById('replyModal');
  const closeBtn = document.getElementById('closeReplyModal');
  const cancelBtn = document.getElementById('cancelReplyBtn');
  const form = document.getElementById('replyForm');

  const closeModal = () => {
    if (modal) modal.classList.remove('open');
    if (form) form.reset();
  };

  if (closeBtn) closeBtn.onclick = closeModal;
  if (cancelBtn) cancelBtn.onclick = closeModal;
  
  if (modal) {
    modal.onclick = (e) => {
      if (e.target === modal) closeModal();
    };
  }

  if (form) {
    form.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('replyReviewId').value;
      const replyText = document.getElementById('replyTextarea').value.trim();

      try {
        const response = await fetch(`${REVIEW_API}/${id}/reply?reply=${encodeURIComponent(replyText)}`, {
          method: 'PUT',
          headers: getAuthHeaders(),
        });

        if (response.status === 401) {
          window.location.href = 'login.html';
          return;
        }

        if (!response.ok) throw new Error('Reply failed');

        closeModal();
        if (window.showToast) window.showToast('Đã gửi phản hồi thành công', 'success');
        loadReviews();
      } catch (err) {
        if (window.showToast) window.showToast('Không thể gửi phản hồi: ' + err.message, 'error');
      }
    };
  }

  // Delegated events for action buttons in tbody
  const tbody = document.getElementById('cskhTableBody');
  if (tbody) {
    tbody.onclick = async (e) => {
      const imageBtn = e.target.closest('.js-review-image');
      const replyBtn = e.target.closest('.js-reply-review');
      const xoaBtn = e.target.closest('.js-xoa-review');

      if (imageBtn) {
        window.open(imageBtn.dataset.full || imageBtn.src, '_blank');
        return;
      }

      if (replyBtn) {
        const id = replyBtn.dataset.id;
        const currentReply = replyBtn.dataset.reply || '';
        const replyIdEl = document.getElementById('replyReviewId');
        const replyTextareaEl = document.getElementById('replyTextarea');
        if (replyIdEl) replyIdEl.value = id;
        if (replyTextareaEl) replyTextareaEl.value = currentReply;
        if (modal) modal.classList.add('open');
      }

      if (xoaBtn) {
        const id = xoaBtn.dataset.id;
        const confirmMsg = 'Bạn chắc chắn muốn xóa đánh giá này?';
        const deleteAction = async () => {
          try {
            const response = await fetch(`${REVIEW_API}/${id}`, {
              method: 'DELETE',
              headers: getAuthHeaders(),
            });

            if (response.status === 401) {
              window.location.href = 'login.html';
              return;
            }

            if (!response.ok) throw new Error('Xóa thất bại');

            if (window.showToast) window.showToast('Đã xóa đánh giá', 'success');
            loadReviews();
          } catch (err) {
            if (window.showToast) window.showToast('Không thể xóa đánh giá: ' + err.message, 'error');
          }
        };

        if (window.showConfirm) {
          window.showConfirm(confirmMsg, deleteAction);
        } else if (confirm(confirmMsg)) {
          deleteAction();
        }
      }
    };
  }

  loadReviews();
};
</script>
