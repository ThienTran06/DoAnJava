<div class="page-shell page-transition active">
  <div class="table-card">
    <div class="header-row">
      <div>
        <div style="font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:4px">Thể loại</div>
        <div style="font-size:13px;color:var(--muted)">Quản lý thể loại sách</div>
      </div>
      <button class="btn primary" id="btnAddCategory">Thêm thể loại</button>
    </div>
    <div class="search-box" style="margin-bottom:18px;width:100%">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b5b5ae" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="categorySearch" placeholder="Tìm kiếm thể loại...">
    </div>
    <div class="table-wrap">
      <table class="tbl-books" style="min-width:100%">
        <thead><tr><th>STT</th><th>Tên thể loại</th><th>Mô tả</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody id="categoryTableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="modal-overlay" id="categoryModal"><div class="modal"><div class="modal-head"><div class="modal-title">📚 Thêm thể loại</div><button class="close" id="closeCategoryModal">×</button></div><form id="categoryForm"><div class="modal-body"><div class="grid"><div class="field full" id="categoryNameField"><div class="label">Tên thể loại</div><input class="input" name="name" required><div class="helper">Nhập tên thể loại</div></div><div class="field full"><div class="label">Mô tả</div><textarea class="textarea" name="description"></textarea></div></div></div><div class="footer-actions"><button type="button" class="btn ghost" id="cancelCategory">Hủy</button><button type="submit" class="btn primary" id="saveCategory"><span class="txt">Lưu thể loại</span><span class="spin"></span></button></div></form></div></div>
</div>

<script>
// Initialize Categories page
window.initCategories = function() {
  const state = {
    items: [
      { name: 'Kinh tế', description: 'Sách về kinh doanh và tài chính', status: 'Hoạt động' },
      { name: 'Tâm lý', description: 'Sách phát triển bản thân', status: 'Hoạt động' },
      { name: 'Văn học', description: 'Tác phẩm văn học chọn lọc', status: 'Hoạt động' },
      { name: 'Thiếu nhi', description: 'Sách cho trẻ em', status: 'Hoạt động' }
    ]
  };
  const modal = document.getElementById('categoryModal');
  const openBtn = document.getElementById('btnAddCategory');
  const closeBtn = document.getElementById('closeCategoryModal');
  const cancelBtn = document.getElementById('cancelCategory');
  const form = document.getElementById('categoryForm');
  const tableBody = document.getElementById('categoryTableBody');
  const search = document.getElementById('categorySearch');
  if (!modal || !openBtn || !form || !tableBody) return;

  const render = (filter = '') => {
    const q = filter.trim().toLowerCase();
    const rows = state.items.filter(i => !q || i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q));
    tableBody.innerHTML = rows.length ? rows.map((item, index) => `
      <tr>
        <td>${index + 1}</td>
        <td style="font-weight:700">${item.name}</td>
        <td style="color:var(--muted)">${item.description}</td>
        <td><span class="badge paid">${item.status}</span></td>
        <td><div class="ops"><button class="link">Sửa</button><button class="link danger">Xóa</button></div></td>
      </tr>
    `).join('') : `<tr><td colspan="5"><div class="empty-state">Không tìm thấy thể loại phù hợp.</div></td></tr>`;
  };

  const closeModal = () => { modal.classList.remove('open'); form.reset(); form.querySelector('.field').classList.remove('error'); };
  
  // Clear old listeners
  if (openBtn) openBtn.onclick = null;
  if (closeBtn) closeBtn.onclick = null;
  if (cancelBtn) cancelBtn.onclick = null;
  if (form) form.onsubmit = null;
  if (search) search.oninput = null;
  
  // Attach new listeners
  if (openBtn) openBtn.onclick = () => modal.classList.add('open');
  if (closeBtn) closeBtn.onclick = closeModal;
  if (cancelBtn) cancelBtn.onclick = closeModal;
  
  modal.removeEventListener('click', window.categoryModalHandler);
  window.categoryModalHandler = e => { if (e.target === modal) closeModal(); };
  modal.addEventListener('click', window.categoryModalHandler);
  
  if (search) search.oninput = e => render(e.target.value);
  
  form.onsubmit = e => {
    e.preventDefault();
    const name = form.name.value.trim();
    const desc = form.description.value.trim();
    const field = form.name.closest('.field');
    const helper = field.querySelector('.helper');
    field.classList.remove('error');
    helper.textContent = 'Nhập tên thể loại';
    if (!name) {
      field.classList.add('error');
      helper.textContent = 'Tên thể loại không được để trống';
      return;
    }
    state.items.unshift({ name, description: desc || '—', status: 'Hoạt động' });
    render(search.value);
    closeModal();
    window.showToast('Đã thêm thể loại');
  };

  render();
};
</script>
