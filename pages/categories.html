<div class="page-shell page-transition active">
  <div class="table-card">
    <div class="header-row">
      <div>
        <div style="font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:4px">Thể loại</div>
        <div style="font-size:13px;color:var(--muted)">Quản lý thể loại sách</div>
      </div>
      <button class="btn primary" id="btnAddCategory">Thêm thể loại</button>
    </div>
    <div class="search-box" style="margin-bottom:18px;width:100%">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b5b5ae" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="categorySearch" placeholder="Tìm kiếm thể loại...">
    </div>
    <div class="table-wrap">
      <table class="tbl-books" style="min-width:100%">
        <thead><tr><th>STT</th><th>Tên thể loại</th><th>Mô tả</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody id="categoryTableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="modal-overlay" id="categoryModal"><div class="modal"><div class="modal-head"><div class="modal-title">📚 Thêm thể loại</div><button class="close" id="closeCategoryModal">×</button></div><form id="categoryForm"><div class="modal-body"><div class="grid"><div class="field full" id="categoryNameField"><div class="label">Tên thể loại</div><input class="input" name="name" required><div class="helper">Nhập tên thể loại</div></div><div class="field full"><div class="label">Mô tả</div><textarea class="textarea" name="description"></textarea></div></div></div><div class="footer-actions"><button type="button" class="btn ghost" id="cancelCategory">Hủy</button><button type="submit" class="btn primary" id="saveCategory"><span class="txt">Lưu thể loại</span><span class="spin"></span></button></div></form></div></div>
</div>

<script>
// Initialize Categories page
window.initCategories = function() {
  const state = {
    items: []
  };
  const modal = document.getElementById('categoryModal');
  const openBtn = document.getElementById('btnAddCategory');
  const closeBtn = document.getElementById('closeCategoryModal');
  const cancelBtn = document.getElementById('cancelCategory');
  const form = document.getElementById('categoryForm');
  const tableBody = document.getElementById('categoryTableBody');
  const search = document.getElementById('categorySearch');
  if (!modal || !openBtn || !form || !tableBody) return;

  const API_BASE = window.API_BASE_URL || 'http://localhost:8081';
  const CATEGORY_API = `${API_BASE}/api/the-loai`;
  let categoriesLoaded = false;
  let categoriesLoading = false;

  const getAuthHeaders = () => {
    const token = localStorage.getItem('token')
      || sessionStorage.getItem('token')
      || window.localStorage.token
      || window.sessionStorage.token;

    return token ? { Authorization: `Bearer ${token}` } : {};
  };

  const mapCategory = (item) => ({
    id: item?.id,
    name: item?.tenTheLoai || '—',
    description: item?.moTa || item?.description || '—',
    status: item?.trangThai || 'Hoạt động'
  });

  const renderLoadingState = () => {
    tableBody.innerHTML = `<tr><td colspan="5"><div class="empty-state">Đang tải thể loại...</div></td></tr>`;
  };

  const renderErrorState = (message) => {
    tableBody.innerHTML = `<tr><td colspan="5"><div class="empty-state">${message}</div></td></tr>`;
  };

  const loadCategoriesFromApi = async () => {
    categoriesLoading = true;
    renderLoadingState();

    try {
      const response = await fetch(CATEGORY_API, {
        headers: {
          Accept: 'application/json',
          ...getAuthHeaders(),
        },
      });

      if (response.status === 401) {
        window.location.href = 'login.html';
        return;
      }

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      state.items = Array.isArray(data) ? data.map(mapCategory) : [];
      categoriesLoaded = true;
      categoriesLoading = false;
      render(search ? search.value : '');
    } catch (error) {
      categoriesLoading = false;
      renderErrorState('Không thể tải danh sách thể loại từ backend.');
    }
  };

  const render = (filter = '') => {
    if (categoriesLoading) return;
    const q = filter.trim().toLowerCase();
    const rows = state.items.filter(i => !q || i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q));
    tableBody.innerHTML = rows.length ? rows.map((item, index) => `
      <tr>
        <td>${index + 1}</td>
        <td style="font-weight:700">${item.name}</td>
        <td style="color:var(--muted)">${item.description}</td>
        <td><span class="badge paid">${item.status}</span></td>
        <td><div class="ops"><button class="link">Sửa</button><button class="link danger">Xóa</button></div></td>
      </tr>
    `).join('') : `<tr><td colspan="5"><div class="empty-state">Không tìm thấy thể loại phù hợp.</div></td></tr>`;
  };

  const closeModal = () => { modal.classList.remove('open'); form.reset(); form.querySelector('.field').classList.remove('error'); };
  
  // Clear old listeners
  if (openBtn) openBtn.onclick = null;
  if (closeBtn) closeBtn.onclick = null;
  if (cancelBtn) cancelBtn.onclick = null;
  if (form) form.onsubmit = null;
  if (search) search.oninput = null;
  
  // Attach new listeners
  if (openBtn) openBtn.onclick = () => modal.classList.add('open');
  if (closeBtn) closeBtn.onclick = closeModal;
  if (cancelBtn) cancelBtn.onclick = closeModal;
  
  modal.removeEventListener('click', window.categoryModalHandler);
  window.categoryModalHandler = e => { if (e.target === modal) closeModal(); };
  modal.addEventListener('click', window.categoryModalHandler);
  
  if (search) search.oninput = e => render(e.target.value);
  
  form.onsubmit = async e => {
    e.preventDefault();
    const name = form.name.value.trim();
    const desc = form.description.value.trim();
    const field = form.name.closest('.field');
    const helper = field.querySelector('.helper');
    field.classList.remove('error');
    helper.textContent = 'Nhập tên thể loại';
    if (!name) {
      field.classList.add('error');
      helper.textContent = 'Tên thể loại không được để trống';
      return;
    }

    const token = localStorage.getItem('token')
      || sessionStorage.getItem('token')
      || window.localStorage.token
      || window.sessionStorage.token;
    const isEdit = window.currentEditCategoryIndex !== undefined;
    const url = isEdit && state.items[window.currentEditCategoryIndex]?.id
      ? `${CATEGORY_API}/${state.items[window.currentEditCategoryIndex].id}`
      : CATEGORY_API;

    try {
      const response = await fetch(url, {
        method: isEdit ? 'PUT' : 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: `Bearer ${token}` } : {})
        },
        body: JSON.stringify({ tenTheLoai: name, moTa: desc || '' }),
      });

      if (response.status === 401) {
        window.location.href = 'login.html';
        return;
      }

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      await response.json();
      window.currentEditCategoryIndex = undefined;
      window.currentEditCategoryName = undefined;
      document.querySelector('.modal-head .modal-title').textContent = '📚 Thêm thể loại';
      document.getElementById('saveCategory').querySelector('.txt').textContent = 'Lưu thể loại';
      await loadCategoriesFromApi();
      render(search.value);
      closeModal();
      form.reset();
      window.showToast(isEdit ? 'Đã cập nhật thể loại' : 'Đã thêm thể loại');
    } catch (error) {
      window.showToast('Không thể lưu thể loại. Vui lòng thử lại.');
    }
  };

  // Handle edit and delete buttons in table
  tableBody.addEventListener('click', e => {
    const editBtn = e.target.closest('.ops .link:not(.danger)');
    const deleteBtn = e.target.closest('.ops .link.danger');
    if (!editBtn && !deleteBtn) return;

    const row = e.target.closest('tr');
    const cells = row.querySelectorAll('td');
    const categoryName = cells[1].textContent.trim();
    const categoryDesc = cells[2].textContent.trim();
    const itemIndex = state.items.findIndex(i => i.name === categoryName);

    if (editBtn) {
      // Open edit modal
      form.name.value = categoryName;
      form.description.value = categoryDesc === '—' ? '' : categoryDesc;
      document.querySelector('.modal-head .modal-title').textContent = '📚 Sửa thể loại';
      document.getElementById('saveCategory').querySelector('.txt').textContent = 'Cập nhật thể loại';
      modal.classList.add('open');
      
      // Store original item for update
      window.currentEditCategoryIndex = itemIndex;
      window.currentEditCategoryName = categoryName;
    } else if (deleteBtn) {
      // Delete confirmation
      window.showConfirm('Bạn chắc chắn muốn xóa thể loại này?', () => {
        state.items.splice(itemIndex, 1);
        render(search.value);
        window.showToast('Đã xóa thể loại');
      });
    }
  });


  render();
  loadCategoriesFromApi();
};
</script>
