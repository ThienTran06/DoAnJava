<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookHouse – Cài đặt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<style>
  /* ─── VARIABLES (light mode defaults) ─── */
  :root {
    --bg: #f6f7ed;
    --surface: #ffffff;
    --border: #e8e8e2;
    --text: #1f1f1f;
    --text-muted: #888880;
    --text-subtle: #b5b5ae;
    --green: #3a7d44;
    --green-light: #e8f5eb;
    --red: #c0392b;
    --red-light: #fdecea;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  }

  /* ─── DARK MODE OVERRIDES ─── */
  [data-theme="dark"] {
    --bg: #1a1a1a;
    --surface: #242424;
    --border: #333333;
    --text: #f0f0f0;
    --text-muted: #aaaaaa;
    --text-subtle: #666666;
    --green-light: #1a3320;
    --red-light: #3a1515;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14.5px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
  }

  /* ─── SVG ICON HELPER ─── */
  .ico { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ico svg { display: block; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 224px; min-width: 224px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 0 0 24px;
    transition: background 0.2s, border-color 0.2s;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 11px;
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--text);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .logo-text { font-weight: 800; font-size: 15.5px; letter-spacing: -0.5px; line-height: 1.1; }
  .logo-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 400; }

  .nav-section { padding: 18px 12px 4px; }
  .nav-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--text-subtle); padding: 0 8px; margin-bottom: 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text-muted);
    font-size: 13.5px; font-weight: 500;
    transition: all 0.15s; user-select: none;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--text); color: #f6f7ed; font-weight: 600; }
  .nav-item.active svg { stroke: #f6f7ed !important; }
  .nav-badge {
    margin-left: auto; background: var(--text); color: white;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px;
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,0.25); }
  .nav-arrow { margin-left: auto; font-size: 11px; opacity: 0.35; }

  .sidebar-footer {
    margin-top: auto; padding: 14px 16px 0;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: var(--radius-sm); cursor: pointer;
  }
  .user-card:hover { background: var(--bg); }
  .avatar {
    width: 32px; height: 32px; background: var(--text);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #f6f7ed; font-size: 12px; font-weight: 700; flex-shrink: 0;
    transition: background 0.2s;
  }
  .user-name { font-weight: 700; font-size: 13px; }
  .user-role { font-size: 11px; color: var(--text-muted); font-weight: 400; }

  /* ─── MAIN ─── */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* ─── TOPBAR ─── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 62px;
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0; position: sticky; top: 0; z-index: 10;
    transition: background 0.2s, border-color 0.2s;
  }
  .topbar-left { flex: 1; }
  .topbar-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .topbar-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-top: 1px; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; position: relative;
  }
  .icon-btn:hover { background: var(--bg); border-color: #ccc; }

  /* ─── CONTENT ─── */
  .content { padding: 28px 28px; flex: 1; max-width: 720px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
