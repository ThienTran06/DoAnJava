<div class="page-shell page-transition active">
  <style>
    .category-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 18px 0 16px;
    }
    .category-tab {
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: background-color .18s ease, color .18s ease, border-color .18s ease, transform .18s ease;
    }
    .category-tab:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      color: var(--text);
    }
    .category-tab.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .category-tab.active:hover {
      color: #fff;
      border-color: var(--text);
    }
    .category-subtitle {
      margin-top: 3px;
      font-size: 13px;
      color: var(--muted);
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .category-grid .field.full {
      grid-column: 1 / -1;
    }
    @media (max-width: 900px) {
      .category-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="table-card">
    <div class="header-row">
      <div>
        <div id="categoryPageTitle" style="font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:4px">Danh mục</div>
        <div id="categoryPageSubtitle" class="category-subtitle">Quản lý thể loại, tác giả và nhà xuất bản</div>
      </div>
      <button class="btn primary" id="btnAddCategory">Thêm thể loại</button>
    </div>

    <div class="category-tabs" id="categoryTabs">
      <button type="button" class="category-tab active" data-mode="the-loai">Thể loại</button>
      <button type="button" class="category-tab" data-mode="tac-gia">Tác giả</button>
      <button type="button" class="category-tab" data-mode="nha-xuat-ban">Nhà xuất bản</button>
    </div>

    <div class="search-box" style="margin-bottom:18px;width:100%">
      <input type="text" id="categorySearch" placeholder="Tìm kiếm thể loại...">
    </div>

    <div class="table-wrap">
      <table class="tbl-books" style="min-width:100%">
        <thead id="categoryTableHead"></thead>
        <tbody id="categoryTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="categoryModal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="categoryModalTitle">Thêm thể loại</div>
        <button class="close" id="closeCategoryModal">Đóng</button>
      </div>
      <form id="categoryForm">
        <div class="modal-body">
          <div class="grid category-grid">
            <div class="field full" id="categoryNameField">
              <div class="label" id="categoryNameLabel">Tên thể loại</div>
              <input class="input" name="name" required>
              <div class="helper" id="categoryNameHelper">Nhập tên thể loại</div>
            </div>
            <div class="field full" id="categoryMetaField">
              <div class="label" id="categoryMetaLabel">Mô tả</div>
              <textarea class="textarea" name="meta"></textarea>
              <div class="helper" id="categoryMetaHelper">Mô tả có thể để trống</div>
            </div>
          </div>
        </div>
        <div class="footer-actions">
          <button type="button" class="btn ghost" id="cancelCategory">Hủy</button>
          <button type="submit" class="btn primary" id="saveCategory"><span class="txt">Lưu thể loại</span><span class="spin"></span></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
window.initCategories = function() {
  const API_BASE = window.API_BASE_URL || window.location.origin;
  const BOOK_API = `${API_BASE}/api/sach`;
  const configs = {
    'the-loai': {
      key: 'the-loai',
      title: 'Thể loại',
      subtitle: 'Quản lý thể loại sách',
      addLabel: 'Thêm thể loại',
      saveLabel: 'Lưu thể loại',
      editLabel: 'Cập nhật thể loại',
      searchPlaceholder: 'Tìm kiếm thể loại...',
      nameLabel: 'Tên thể loại',
      metaLabel: 'Mô tả',
      metaHelper: 'Mô tả có thể để trống',
      api: `${API_BASE}/api/the-loai`,
      map: item => ({
        id: item?.id,
        name: item?.tenTheLoai || '',
        meta: item?.moTa || '',
      }),
      payload: (name, meta) => ({ tenTheLoai: name, moTa: meta }),
      columns: ['STT', 'Tên thể loại', 'Mô tả', 'Trạng thái', 'Thao tác'],
      search: item => `${item.name} ${item.meta}`,
      renderRow: item => [item.name || '—', item.meta || '—'],
    },
    'tac-gia': {
      key: 'tac-gia',
      title: 'Tác giả',
      subtitle: 'Quản lý tác giả sách',
      addLabel: 'Thêm tác giả',
      saveLabel: 'Lưu tác giả',
      editLabel: 'Cập nhật tác giả',
      searchPlaceholder: 'Tìm kiếm tác giả...',
      nameLabel: 'Họ và tên',
      metaLabel: 'Quốc tịch',
      metaHelper: 'Quốc tịch có thể để trống',
      api: `${API_BASE}/api/tac-gia`,
      map: item => ({
        id: item?.id,
        name: item?.hoTen || '',
        meta: item?.quocTich || '',
      }),
      payload: (name, meta) => ({ hoTen: name, quocTich: meta }),
      columns: ['STT', 'Họ tên', 'Quốc tịch', 'Trạng thái', 'Thao tác'],
      search: item => `${item.name} ${item.meta}`,
      renderRow: item => [item.name || '—', item.meta || '—'],
    },
    'nha-xuat-ban': {
      key: 'nha-xuat-ban',
      title: 'Nhà xuất bản',
      subtitle: 'Quản lý nhà xuất bản sách',
      addLabel: 'Thêm nhà xuất bản',
      saveLabel: 'Lưu nhà xuất bản',
      editLabel: 'Cập nhật nhà xuất bản',
      searchPlaceholder: 'Tìm kiếm nhà xuất bản...',
      nameLabel: 'Tên nhà xuất bản',
      metaLabel: 'Địa chỉ',
      metaHelper: 'Địa chỉ có thể để trống',
      api: `${API_BASE}/api/nha-xuat-ban`,
      map: item => ({
        id: item?.id,
        name: item?.tenNxb || item?.tenNXB || '',
        meta: item?.diaChi || '',
      }),
      payload: (name, meta) => ({ tenNxb: name, diaChi: meta }),
      columns: ['STT', 'Tên nhà xuất bản', 'Địa chỉ', 'Trạng thái', 'Thao tác'],
      search: item => `${item.name} ${item.meta}`,
      renderRow: item => [item.name || '—', item.meta || '—'],
    }
  };

  const state = {
    activeMode: 'the-loai',
    items: {
      'the-loai': [],
      'tac-gia': [],
      'nha-xuat-ban': [],
    },
    loaded: {
      'the-loai': false,
      'tac-gia': false,
      'nha-xuat-ban': false,
    },
    search: {
      'the-loai': '',
      'tac-gia': '',
      'nha-xuat-ban': '',
    },
    usage: {
      'the-loai': new Map(),
      'tac-gia': new Map(),
      'nha-xuat-ban': new Map(),
    },
    editingId: null,
  };

  const modal = document.getElementById('categoryModal');
  const modalTitle = document.getElementById('categoryModalTitle');
  const openBtn = document.getElementById('btnAddCategory');
  const closeBtn = document.getElementById('closeCategoryModal');
  const cancelBtn = document.getElementById('cancelCategory');
  const form = document.getElementById('categoryForm');
  const tableHead = document.getElementById('categoryTableHead');
  const tableBody = document.getElementById('categoryTableBody');
  const search = document.getElementById('categorySearch');
  const tabs = document.getElementById('categoryTabs');
  const titleEl = document.getElementById('categoryPageTitle');
  const subtitleEl = document.getElementById('categoryPageSubtitle');
  const nameField = document.getElementById('categoryNameField');
  const metaField = document.getElementById('categoryMetaField');
  const nameLabel = document.getElementById('categoryNameLabel');
  const metaLabel = document.getElementById('categoryMetaLabel');
  const nameHelper = document.getElementById('categoryNameHelper');
  const metaHelper = document.getElementById('categoryMetaHelper');
  const saveBtn = document.getElementById('saveCategory');

  if (!modal || !form || !tableHead || !tableBody || !search || !tabs) return;

  const getAuthHeaders = () => {
    const token = localStorage.getItem('token')
      || sessionStorage.getItem('token')
      || window.localStorage.token
      || window.sessionStorage.token;
    return token ? { Authorization: `Bearer ${token}` } : {};
  };

  const readErrorMessage = async (response, fallback) => {
    try {
      const text = await response.text();
      if (!text) return fallback;
      const parsed = JSON.parse(text);
      return parsed?.message || parsed?.error || text;
    } catch (error) {
      return fallback;
    }
  };

  const getUsageMap = (mode) => state.usage[mode] || new Map();

  const updateUsageFromBooks = (books = []) => {
    const usage = {
      'the-loai': new Map(),
      'tac-gia': new Map(),
      'nha-xuat-ban': new Map(),
    };

    books.forEach(book => {
      const categoryId = book?.theLoai?.id ?? book?.theLoaiId;
      if (categoryId != null) {
        const key = String(categoryId);
        usage['the-loai'].set(key, (usage['the-loai'].get(key) || 0) + 1);
      }

      const publisherId = book?.nhaXuatBan?.id ?? book?.nhaXuatBanId;
      if (publisherId != null) {
        const key = String(publisherId);
        usage['nha-xuat-ban'].set(key, (usage['nha-xuat-ban'].get(key) || 0) + 1);
      }

      const authors = Array.isArray(book?.danhSachTacGia) ? book.danhSachTacGia : [];
      authors.forEach(author => {
        const authorId = author?.id;
        if (authorId != null) {
          const key = String(authorId);
          usage['tac-gia'].set(key, (usage['tac-gia'].get(key) || 0) + 1);
        }
      });
    });

    state.usage = usage;
  };

  const loadUsageFromBooks = async () => {
    try {
      const response = await fetch(BOOK_API, {
        headers: {
          Accept: 'application/json',
          ...getAuthHeaders(),
        },
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      updateUsageFromBooks(Array.isArray(data) ? data : []);
    } catch (error) {
      updateUsageFromBooks(window.allBooks || []);
    }
    renderTable();
  };

  const setActiveTab = (mode) => {
    state.activeMode = configs[mode] ? mode : 'the-loai';
    Array.from(tabs.querySelectorAll('[data-mode]')).forEach(button => {
      button.classList.toggle('active', button.dataset.mode === state.activeMode);
    });
  };

  const updateShellText = () => {
    const config = configs[state.activeMode];
    if (!config) return;
    if (titleEl) titleEl.textContent = 'Danh mục';
    if (subtitleEl) subtitleEl.textContent = config.subtitle;
    if (openBtn) openBtn.textContent = config.addLabel;
    if (search) search.placeholder = config.searchPlaceholder;
    if (nameLabel) nameLabel.textContent = config.nameLabel;
    if (metaLabel) metaLabel.textContent = config.metaLabel;
    if (nameHelper) nameHelper.textContent = `Nhập ${config.nameLabel.toLowerCase()}`;
    if (metaHelper) metaHelper.textContent = config.metaHelper;
  };

  const renderTableHead = () => {
    const config = configs[state.activeMode];
    if (!config) return;
    tableHead.innerHTML = `
      <tr>
        ${config.columns.map(column => `<th>${column}</th>`).join('')}
      </tr>
    `;
  };

  const getStatusLabel = (mode, id) => {
    const count = Number(getUsageMap(mode).get(String(id)) || 0);
    return {
      count,
      label: count > 0 ? `Đang dùng (${count})` : 'Chưa dùng',
      className: count > 0 ? 'ok' : 'bad',
    };
  };

  const renderLoadingState = () => {
    tableBody.innerHTML = `
      <tr>
        <td colspan="5"><div class="empty-state">Đang tải dữ liệu...</div></td>
      </tr>
    `;
  };

  const renderEmptyState = (message) => {
    tableBody.innerHTML = `
      <tr>
        <td colspan="5"><div class="empty-state">${message}</div></td>
      </tr>
    `;
  };

  const renderTable = () => {
    const config = configs[state.activeMode];
    if (!config) return;

    renderTableHead();
    updateShellText();

    const keyword = (state.search[state.activeMode] || '').trim().toLowerCase();
    const rows = (state.items[state.activeMode] || []).filter(item => {
      if (!keyword) return true;
      return config.search(item).toLowerCase().includes(keyword);
    });

    if (!rows.length) {
      renderEmptyState(state.loaded[state.activeMode] ? 'Không tìm thấy dữ liệu phù hợp.' : 'Chưa có dữ liệu.');
      return;
    }

    tableBody.innerHTML = rows.map((item, index) => {
      const [primary, secondary] = config.renderRow(item);
      const status = getStatusLabel(state.activeMode, item.id);
      return `
        <tr>
          <td>${index + 1}</td>
          <td style="font-weight:700">${primary}</td>
          <td style="color:var(--muted)">${secondary}</td>
          <td><span class="badge ${status.className}">${status.label}</span></td>
          <td>
            <div class="ops">
              <button class="link category-edit" data-id="${item.id}">Sửa</button>
              <button class="link danger category-delete" data-id="${item.id}">Xóa</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  };

  const showModal = () => {
    modal.classList.add('open');
  };

  const closeModal = () => {
    modal.classList.remove('open');
    state.editingId = null;
    form.reset();
    form.querySelectorAll('.field').forEach(field => field.classList.remove('error'));
    updateShellText();
  };

  const populateForm = (item) => {
    const config = configs[state.activeMode];
    if (!config) return;
    form.name.value = item?.name || '';
    form.meta.value = item?.meta || '';
    modalTitle.textContent = item ? config.editLabel : config.addLabel;
    saveBtn.querySelector('.txt').textContent = item ? config.editLabel : config.saveLabel;
    showModal();
  };

  const loadItems = async (mode) => {
    const config = configs[mode];
    if (!config) return;

    renderLoadingState();

    try {
      const response = await fetch(config.api, {
        headers: {
          Accept: 'application/json',
          ...getAuthHeaders(),
        },
      });

      if (response.status === 401) {
        window.location.href = 'login.html';
        return;
      }

      if (!response.ok) {
        const message = await readErrorMessage(response, `Không thể tải ${config.title.toLowerCase()}.`);
        throw new Error(message);
      }

      const data = await response.json();
      state.items[mode] = Array.isArray(data) ? data.map(config.map) : [];
      state.loaded[mode] = true;
      renderTable();
    } catch (error) {
      state.items[mode] = [];
      state.loaded[mode] = false;
      renderEmptyState(error.message || `Không thể tải ${config.title.toLowerCase()}.`);
    }
  };

  const switchMode = async (mode) => {
    if (!configs[mode]) return;
    setActiveTab(mode);
    updateShellText();

    const currentSearch = state.search[mode] || '';
    if (search.value !== currentSearch) {
      search.value = currentSearch;
    }

    if (state.loaded[mode]) {
      renderTable();
      return;
    }

    await loadItems(mode);
  };

  const findItemById = (mode, id) => {
    return (state.items[mode] || []).find(item => String(item.id) === String(id));
  };

  const duplicateNameExists = (mode, name, editingId) => {
    const normalized = name.trim().toLowerCase();
    return (state.items[mode] || []).some((item, index) => {
      const sameName = String(item.name || '').trim().toLowerCase() === normalized;
      const sameId = editingId != null && String(item.id) === String(editingId);
      return sameName && !sameId;
    });
  };

  const submitForm = async (event) => {
    event.preventDefault();

    const config = configs[state.activeMode];
    if (!config) return;

    const name = form.name.value.trim();
    const meta = form.meta.value.trim();

    form.querySelectorAll('.field').forEach(field => field.classList.remove('error'));

    const nameFieldEl = nameField || form.name.closest('.field');
    const metaFieldEl = metaField || form.meta.closest('.field');

    const markField = (field, helper, message) => {
      if (!field) return;
      field.classList.add('error');
      if (helper) helper.textContent = message;
    };

    if (!name) {
      markField(nameFieldEl, nameHelper, `${config.nameLabel} không được để trống`);
      return;
    }

    if (duplicateNameExists(state.activeMode, name, state.editingId)) {
      markField(nameFieldEl, nameHelper, `${config.nameLabel} đã tồn tại`);
      return;
    }

    const payload = config.payload(name, meta);
    const isEdit = state.editingId != null;
    const url = isEdit ? `${config.api}/${state.editingId}` : config.api;
    const method = isEdit ? 'PUT' : 'POST';

    try {
      const response = await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json',
          Accept: 'application/json',
          ...getAuthHeaders(),
        },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        const message = await readErrorMessage(response, isEdit ? 'Không thể cập nhật dữ liệu.' : 'Không thể lưu dữ liệu.');
        throw new Error(message);
      }

      const saved = config.map(await response.json());
      if (isEdit) {
        const index = (state.items[state.activeMode] || []).findIndex(item => String(item.id) === String(state.editingId));
        if (index >= 0) {
          state.items[state.activeMode][index] = saved;
        }
      } else {
        state.items[state.activeMode].unshift(saved);
      }

      state.editingId = null;
      window.showToast(isEdit ? `${config.title} đã được cập nhật` : `${config.title} đã được thêm`);
      closeModal();
      renderTable();
    } catch (error) {
      window.showToast(error.message || 'Không thể lưu dữ liệu');
    }
  };

  const handleTableAction = async (event) => {
    const editBtn = event.target.closest('.category-edit');
    const deleteBtn = event.target.closest('.category-delete');
    if (!editBtn && !deleteBtn) return;

    const config = configs[state.activeMode];
    if (!config) return;

    const id = editBtn ? editBtn.dataset.id : deleteBtn.dataset.id;
    const item = findItemById(state.activeMode, id);
    if (!item) return;

    if (editBtn) {
      state.editingId = item.id;
      modalTitle.textContent = config.editLabel;
      saveBtn.querySelector('.txt').textContent = config.editLabel;
      populateForm(item);
      return;
    }

    window.showConfirm(`Bạn chắc chắn muốn xóa ${config.title.toLowerCase()} này?`, async () => {
      try {
        const response = await fetch(`${config.api}/${id}`, {
          method: 'DELETE',
          headers: {
            Accept: 'application/json',
            ...getAuthHeaders(),
          },
        });

        if (!response.ok) {
          const message = await readErrorMessage(response, `Không thể xóa ${config.title.toLowerCase()}.`);
          throw new Error(message);
        }

        state.items[state.activeMode] = (state.items[state.activeMode] || []).filter(entry => String(entry.id) !== String(id));
        window.showToast(`${config.title} đã được xóa`);
        renderTable();
      } catch (error) {
        window.showToast(error.message || `Không thể xóa ${config.title.toLowerCase()}`);
      }
    });
  };

  tabs.addEventListener('click', event => {
    const button = event.target.closest('[data-mode]');
    if (!button) return;
    state.search[state.activeMode] = search.value;
    switchMode(button.dataset.mode);
  });

  search.addEventListener('input', event => {
    state.search[state.activeMode] = event.target.value;
    renderTable();
  });

  openBtn.addEventListener('click', () => {
    state.editingId = null;
    modalTitle.textContent = configs[state.activeMode].addLabel;
    saveBtn.querySelector('.txt').textContent = configs[state.activeMode].saveLabel;
    form.reset();
    form.querySelectorAll('.field').forEach(field => field.classList.remove('error'));
    showModal();
  });

  closeBtn.addEventListener('click', closeModal);
  cancelBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', event => {
    if (event.target === modal) closeModal();
  });
  form.addEventListener('submit', submitForm);
  tableBody.addEventListener('click', handleTableAction);

  updateShellText();
  setActiveTab(state.activeMode);
  switchMode(state.activeMode);
  loadUsageFromBooks();
};
</script>
