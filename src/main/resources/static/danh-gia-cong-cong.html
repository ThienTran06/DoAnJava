<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đánh giá khách hàng – BookHouse</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7ed; --surface: #ffffff; --border: #e8e8e2;
    --text: #1f1f1f; --muted: #888880; --subtle: #b5b5ae;
    --green: #3a7d44; --green-light: #e8f5eb;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 14.5px; font-weight: 500;
  }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 62px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { opacity: 0.4; font-weight: 400; margin-left: 8px; font-size: 13px; }
  .container { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; margin-bottom: 4px; }
  .page-sub { color: var(--muted); font-size: 13px; font-weight: 400; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 16px; border-radius: 20px; font-family: inherit;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--text); color: #f6f7ed; border-color: var(--text); }
  .sort-select {
    font-family: inherit; font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 7px 12px; background: var(--surface); color: var(--text);
    cursor: pointer; outline: none;
  }

  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .stat-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 400; }

  .reviews-list { display: flex; flex-direction: column; gap: 14px; }
  .review-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
    transition: box-shadow 0.2s;
  }
  .review-card:hover { box-shadow: var(--shadow); }
  .review-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .reviewer-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .review-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .type-badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 600;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  }
  .review-date { font-size: 12px; color: var(--subtle); }
  .stars { display: flex; gap: 2px; margin-bottom: 10px; }
  .star { font-size: 16px; color: #f1c40f; }
  .star.empty { color: var(--border); }
  .book-block {
    background: var(--bg); border-left: 3px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px;
    font-size: 13px; color: var(--muted);
  }
  .book-block strong { color: var(--text); }
  .review-content { color: var(--text); line-height: 1.65; font-size: 14px; }

  .review-images {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
  }
  .review-image {
    width: 88px; height: 88px; object-fit: cover;
    border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    cursor: zoom-in; background: var(--bg);
  }
  .image-modal {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    padding: 24px; background: rgba(0,0,0,0.72);
  }
  .image-modal.open { display: flex; }
  .image-modal img {
    max-width: min(960px, 96vw); max-height: 92vh;
    border-radius: var(--radius-sm); background: var(--surface);
  }
  .reply-block {
    margin-top: 14px; padding: 12px 14px;
    border-left: 3px solid var(--green); border-radius: var(--radius-sm);
    background: var(--green-light);
  }
  .reply-label { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 5px; }
  .reply-text { font-size: 13.5px; color: var(--text); line-height: 1.55; }
  .reply-by { font-size: 11.5px; color: var(--muted); margin-top: 6px; }

  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--muted); font-size: 14px;
  }
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">BookHouse <span>Đánh giá từ khách hàng</span></div>
</div>

<div class="container">
  <div class="page-header">
    <div class="page-title">Đánh giá khách hàng</div>
    <div class="page-sub">Nhận xét chất lượng Sách và Dịch vụ của BookHouse</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stTotal">—</div><div class="stat-lbl">Tổng đánh giá</div></div>
    <div class="stat-card"><div class="stat-val" id="stAvg">—</div><div class="stat-lbl">Điểm trung bình</div></div>
    <div class="stat-card"><div class="stat-val" id="stFive">—</div><div class="stat-lbl">Đánh giá 5 sao</div></div>
    <div class="stat-card"><div class="stat-val" id="stReplied">—</div><div class="stat-lbl">Đã được phản hồi</div></div>
  </div>

  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">Tất cả</button>
      <button class="filter-btn" data-filter="SACH">Sách</button>
      <button class="filter-btn" data-filter="DICH_VU">Dịch vụ</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="latest">Mới nhất</option>
      <option value="highest">5 sao trước</option>
      <option value="lowest">Ít sao trước</option>
    </select>
  </div>

  <div class="reviews-list" id="reviewsList">
    <div class="loading">Đang tải đánh giá...</div>
  </div>
</div>

<div class="image-modal" id="imageModal">
  <img id="imageModalImg" alt="?nh ??nh gi?">
</div>

<script>
  const API = window.location.origin + '/api/danh-gia/public';
  let all = [], currentFilter = 'all';

  function esc(v) {
    if (!v) return '';
    const d = document.createElement('div');
    d.textContent = v; return d.innerHTML;
  }

  function stars(n) {
    return Array.from({length:5}, (_,i) =>
      `<span class="star${i<n?'':' empty'}">★</span>`).join('');
  }

  function timeAgo(str) {
    if (!str) return '—';
    const d = new Date(str), now = new Date();
    const m = Math.floor((now-d)/60000);
    if (m < 1) return 'Vừa xong';
    if (m < 60) return m + ' phút trước';
    const h = Math.floor(m/60);
    if (h < 24) return h + ' giờ trước';
    const days = Math.floor(h/24);
    if (days < 7) return days + ' ngày trước';
    return d.toLocaleDateString('vi-VN');
  }


  function reviewImages(value) {
    if (!value) return '';
    const urls = String(value).split(',').map(x => x.trim()).filter(Boolean);
    if (!urls.length) return '';
    return `<div class="review-images">${urls.map(url =>
      `<img class="review-image" src="${esc(url)}" alt="?nh ??nh gi?" data-full="${esc(url)}">`
    ).join('')}</div>`;
  }

  function renderStats(data) {
    document.getElementById('stTotal').textContent = data.length;
    const avg = data.length ? (data.reduce((s,r)=>s+r.diemSao,0)/data.length).toFixed(1) : '—';
    document.getElementById('stAvg').textContent = avg + ' ★';
    document.getElementById('stFive').textContent = data.filter(r=>r.diemSao===5).length;
    document.getElementById('stReplied').textContent = data.filter(r=>r.reply).length;
  }

  function render() {
    const sort = document.getElementById('sortSelect').value;
    let list = all.filter(r => currentFilter === 'all' || r.loai === currentFilter);
    if (sort === 'highest') list = [...list].sort((a,b)=>b.diemSao-a.diemSao);
    else if (sort === 'lowest') list = [...list].sort((a,b)=>a.diemSao-b.diemSao);
    else list = [...list].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

    const el = document.getElementById('reviewsList');
    if (!list.length) { el.innerHTML = '<div class="empty-state">Chưa có đánh giá nào.</div>'; return; }

    el.innerHTML = list.map(r => `
      <div class="review-card">
        <div class="review-top">
          <div>
            <div class="reviewer-name">${esc(r.khachHang?.hoTen || 'Ẩn danh')}</div>
            <div class="review-meta">
              <span class="type-badge">${r.loai === 'SACH' ? 'Sách' : 'Dịch vụ'}</span>
              <span class="review-date">${timeAgo(r.createdAt)}</span>
            </div>
          </div>
        </div>
        <div class="stars">${stars(r.diemSao)}</div>
        ${r.sach ? `<div class="book-block"><strong>📖 ${esc(r.sach.tenSach)}</strong></div>` : ''}
        <div class="review-content">${esc(r.noiDung)}</div>
        ${reviewImages(r.hinhAnh)}
        ${r.reply ? `
          <div class="reply-block">
            <div class="reply-label">💬 Phản hồi từ cửa hàng</div>
            <div class="reply-text">${esc(r.reply)}</div>
            ${r.replyBy ? `<div class="reply-by">— ${esc(r.replyBy)}</div>` : ''}
          </div>` : ''}
      </div>
    `).join('');
  }

  async function load() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      all = await res.json();
      renderStats(all);
      render();
    } catch(e) {
      document.getElementById('reviewsList').innerHTML =
        `<div class="empty-state">Không thể tải đánh giá: ${esc(e.message)}</div>`;
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });
  document.getElementById('sortSelect').addEventListener('change', render);


  const imageModal = document.getElementById('imageModal');
  const imageModalImg = document.getElementById('imageModalImg');
  document.getElementById('reviewsList').addEventListener('click', (e) => {
    const img = e.target.closest('.review-image');
    if (!img) return;
    imageModalImg.src = img.dataset.full;
    imageModal.classList.add('open');
  });
  imageModal.addEventListener('click', () => {
    imageModal.classList.remove('open');
    imageModalImg.src = '';
  });

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
