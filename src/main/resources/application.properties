spring.application.name=qlns1
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.auth.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:None}
app.cors.allowed-origin-patterns=${ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app,https://doanjava-production.up.railway.app,null}



