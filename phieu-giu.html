<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookHouse - Phiếu giữ sách</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7ed;
      --surface: #ffffff;
      --border: #e8e8e2;
      --text: #1f1f1f;
      --muted: #77776f;
      --soft: #f0f1e8;
      --green: #2f7d46;
      --red: #b93a32;
      --amber: #a96712;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
    .mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--text);
      color: var(--bg);
      font-weight: 800;
    }
    .back {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    main { padding: 24px 28px 36px; max-width: 1320px; margin: 0 auto; }
    .page-head { display: flex; justify-content: space-between; gap: 18px; align-items: flex-end; margin-bottom: 18px; }
    h1 { font-size: 26px; letter-spacing: -0.5px; margin-bottom: 4px; }
    .hint { color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: 370px 1fr; gap: 16px; align-items: start; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
    }
    .panel + .panel { margin-top: 14px; }
    .panel-title { font-weight: 800; margin-bottom: 14px; font-size: 15px; }
    label { display: block; font-weight: 700; font-size: 12px; margin-bottom: 7px; color: #44443d; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 11px;
      font: inherit;
      outline: none;
      background: #fbfbf7;
    }
    input:focus { border-color: #1f1f1f; background: #fff; }
    .field { margin-bottom: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      border: 0;
      background: var(--text);
      color: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      min-height: 38px;
    }
    button.secondary { background: var(--soft); color: var(--text); border: 1px solid var(--border); }
    button.danger { background: var(--red); }
    button.warn { background: var(--amber); }
    button:disabled { opacity: .55; cursor: wait; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .status {
      margin-bottom: 14px;
      min-height: 38px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      display: flex;
      align-items: center;
    }
    .status.ok { color: var(--green); background: #e7f4ea; }
    .status.err { color: var(--red); background: #fdeceb; }
    .table-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 780px; background: var(--surface); }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); background: #fafaf6; }
    tr:last-child td { border-bottom: 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
      background: var(--soft);
      color: var(--muted);
    }
    .badge.pending { background: #fff3d9; color: #9a5c00; }
    .badge.confirmed { background: #e7f4ea; color: var(--green); }
    .badge.cancelled, .badge.expired { background: #fdeceb; color: var(--red); }
    .detail-list { display: grid; gap: 6px; min-width: 190px; }
    .detail-item { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); }
    .detail-item strong { color: var(--text); }
    @media (max-width: 920px) {
      header, main { padding-left: 16px; padding-right: 16px; }
      .layout { grid-template-columns: 1fr; }
      .page-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="mark">B</span><span>BookHouse</span></div>
    <a class="back" href="index.html">Về tổng quan</a>
  </header>

  <main>
    <div class="page-head">
      <div>
        <h1>Phiếu giữ sách</h1>
        <div class="hint">Tạo phiếu, thêm sách, xác nhận thành hóa đơn hoặc hủy/expire phiếu giữ.</div>
      </div>
      <button class="secondary" id="reloadBtn" type="button">Tải lại</button>
    </div>

    <div class="status" id="statusBox">Sẵn sàng.</div>

    <div class="layout">
      <aside>
        <section class="panel">
          <div class="panel-title">Tạo phiếu giữ</div>
          <form id="createForm">
            <div class="field">
              <label for="khachHangId">Mã khách hàng</label>
              <input id="khachHangId" type="number" min="1" required>
            </div>
            <button type="submit">Tạo phiếu</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-title">Thêm sách vào phiếu</div>
          <form id="addBookForm">
            <div class="field">
              <label for="addPhieuId">Mã phiếu</label>
              <input id="addPhieuId" type="number" min="1" required>
            </div>
            <div class="row">
              <div class="field">
                <label for="sachId">Mã sách</label>
                <input id="sachId" type="number" min="1" required>
              </div>
              <div class="field">
                <label for="soLuong">Số lượng</label>
                <input id="soLuong" type="number" min="1" value="1" required>
              </div>
            </div>
            <button type="submit">Thêm sách</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-title">Xác nhận phiếu</div>
          <form id="confirmForm">
            <div class="row">
              <div class="field">
                <label for="confirmPhieuId">Mã phiếu</label>
                <input id="confirmPhieuId" type="number" min="1" required>
              </div>
              <div class="field">
                <label for="nhanVienId">Mã nhân viên</label>
                <input id="nhanVienId" type="number" min="1" required>
              </div>
            </div>
            <button type="submit">Xác nhận</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-title">Xóa chi tiết</div>
          <form id="deleteDetailForm">
            <div class="field">
              <label for="chiTietId">Mã chi tiết phiếu giữ</label>
              <input id="chiTietId" type="number" min="1" required>
            </div>
            <button class="danger" type="submit">Xóa chi tiết</button>
          </form>
        </section>
      </aside>

      <section class="panel">
        <div class="panel-title">Danh sách phiếu giữ</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Mã phiếu</th>
                <th>Khách hàng</th>
                <th>Ngày tạo</th>
                <th>Hết hạn</th>
                <th>Trạng thái</th>
                <th>Sách giữ</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="7">Chưa tải dữ liệu.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = localStorage.getItem('apiBase') || 'http://localhost:8080';
    const statusBox = document.getElementById('statusBox');
    const rows = document.getElementById('rows');

    function token() {
      return localStorage.getItem('token');
    }

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = 'status' + (type ? ' ' + type : '');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function api(path, options = {}) {
      const jwt = token();
      if (!jwt) {
        window.location.href = 'login.html';
        throw new Error('Missing token');
      }

      const res = await fetch(API_BASE + path, {
        ...options,
        headers: {
          Authorization: 'Bearer ' + jwt,
          ...(options.headers || {})
        },
        credentials: 'include'
      });

      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
        throw new Error('Unauthorized');
      }

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || 'HTTP ' + res.status);
      }

      const text = await res.text();
      if (!text) return null;
      try { return JSON.parse(text); }
      catch { return text; }
    }

    function dateTime(value) {
      if (!value) return '--';
      return new Date(value).toLocaleString('vi-VN');
    }

    function badgeClass(status) {
      return String(status || '').toLowerCase();
    }

    function renderDetails(items) {
      if (!items || !items.length) return '<span class="hint">Chưa có sách</span>';
      return `<div class="detail-list">${items.map(item => {
        const sach = item.sach || {};
        return `<div class="detail-item"><span>#${item.id} - ${escapeHtml(sach.tenSach || 'Sách ' + (sach.id || ''))}</span><strong>x${Number(item.soLuong || 0)}</strong></div>`;
      }).join('')}</div>`;
    }

    async function loadData() {
      setStatus('Đang tải dữ liệu...');
      rows.innerHTML = '<tr><td colspan="7">Đang tải...</td></tr>';
      try {
        const data = await api('/api/phieu-giu');
        rows.innerHTML = data && data.length ? data.map(item => `
          <tr>
            <td style="font-weight:800">#${item.id}</td>
            <td>${escapeHtml(item.khachHangId)}</td>
            <td>${dateTime(item.createdAt)}</td>
            <td>${dateTime(item.expiredAt)}</td>
            <td><span class="badge ${badgeClass(item.trangThai)}">${escapeHtml(item.trangThai)}</span></td>
            <td>${renderDetails(item.danhSachSach)}</td>
            <td>
              <div class="actions">
                <button class="secondary" type="button" data-fill="${item.id}">Chọn</button>
                <button class="warn" type="button" data-expire="${item.id}">Expire</button>
                <button class="danger" type="button" data-cancel="${item.id}">Hủy</button>
              </div>
            </td>
          </tr>
        `).join('') : '<tr><td colspan="7">Không có dữ liệu.</td></tr>';
        setStatus('Đã tải danh sách phiếu giữ.', 'ok');
      }
      catch (error) {
        rows.innerHTML = `<tr><td colspan="7">Lỗi: ${escapeHtml(error.message)}</td></tr>`;
        setStatus('Không tải được dữ liệu: ' + error.message, 'err');
      }
    }

    async function submitForm(form, action) {
      form.querySelectorAll('button').forEach(button => button.disabled = true);
      try {
        await action();
        await loadData();
      }
      catch (error) {
        setStatus(error.message, 'err');
      }
      finally {
        form.querySelectorAll('button').forEach(button => button.disabled = false);
      }
    }

    document.getElementById('createForm').addEventListener('submit', event => {
      event.preventDefault();
      submitForm(event.currentTarget, async () => {
        const khachHangId = document.getElementById('khachHangId').value;
        const id = await api('/api/phieu-giu/tao?khachHangId=' + encodeURIComponent(khachHangId), { method: 'POST' });
        document.getElementById('addPhieuId').value = id;
        document.getElementById('confirmPhieuId').value = id;
        setStatus('Đã tạo phiếu #' + id, 'ok');
      });
    });

    document.getElementById('addBookForm').addEventListener('submit', event => {
      event.preventDefault();
      submitForm(event.currentTarget, async () => {
        const params = new URLSearchParams({
          phieuId: document.getElementById('addPhieuId').value,
          sachId: document.getElementById('sachId').value,
          soLuong: document.getElementById('soLuong').value
        });
        await api('/api/chi-tiet-phieu-giu/them?' + params, { method: 'POST' });
        setStatus('Đã thêm sách vào phiếu.', 'ok');
      });
    });

    document.getElementById('confirmForm').addEventListener('submit', event => {
      event.preventDefault();
      submitForm(event.currentTarget, async () => {
        const phieuId = document.getElementById('confirmPhieuId').value;
        const nhanVienId = document.getElementById('nhanVienId').value;
        await api(`/api/phieu-giu/confirm/${encodeURIComponent(phieuId)}?nhanVienId=${encodeURIComponent(nhanVienId)}`, { method: 'POST' });
        setStatus('Đã xác nhận phiếu thành hóa đơn.', 'ok');
      });
    });

    document.getElementById('deleteDetailForm').addEventListener('submit', event => {
      event.preventDefault();
      submitForm(event.currentTarget, async () => {
        const chiTietId = document.getElementById('chiTietId').value;
        await api('/api/chi-tiet-phieu-giu/xoa/' + encodeURIComponent(chiTietId), { method: 'DELETE' });
        setStatus('Đã xóa chi tiết và hoàn tồn kho.', 'ok');
      });
    });

    rows.addEventListener('click', event => {
      const fillId = event.target.dataset.fill;
      const expireId = event.target.dataset.expire;
      const cancelId = event.target.dataset.cancel;
      if (fillId) {
        document.getElementById('addPhieuId').value = fillId;
        document.getElementById('confirmPhieuId').value = fillId;
        setStatus('Đã chọn phiếu #' + fillId + '.', 'ok');
      }
      if (expireId) {
        submitForm(document.body, async () => {
          await api('/api/phieu-giu/expire/' + encodeURIComponent(expireId), { method: 'POST' });
          setStatus('Đã expire phiếu #' + expireId + '.', 'ok');
        });
      }
      if (cancelId) {
        submitForm(document.body, async () => {
          await api('/api/phieu-giu/huy/' + encodeURIComponent(cancelId), { method: 'POST' });
          setStatus('Đã hủy phiếu #' + cancelId + '.', 'ok');
        });
      }
    });

    document.getElementById('reloadBtn').addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
