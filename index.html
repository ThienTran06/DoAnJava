<head>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f7ed;--surface:#fff;--border:#e8e8e2;--text:#1f1f1f;--muted:#888880;--subtle:#b5b5ae;--green:#3a7d44;--green-light:#e8f5eb;--red:#c0392b;--red-light:#fdecea;--radius:14px;--radius-sm:8px;--shadow:0 20px 60px rgba(0,0,0,.18);--shadow-md:0 4px 16px rgba(0,0,0,.08)}
*{box-sizing:border-box}
body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14.5px;font-weight:500}
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}.ico svg{display:block}
.sidebar{width:224px;min-width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:0 0 24px}.sidebar-logo{display:flex;align-items:center;gap:11px;padding:22px 20px 18px;border-bottom:1px solid var(--border)}.logo-mark{width:34px;height:34px;background:var(--text);border-radius:9px;display:flex;align-items:center;justify-content:center}.logo-text{font-weight:800;font-size:15.5px;letter-spacing:-.5px;line-height:1.1}.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;font-weight:400}.nav-section{padding:18px 12px 4px}.nav-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--subtle);padding:0 8px;margin-bottom:4px}.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:500;transition:all .15s;user-select:none;text-decoration:none}.nav-item:hover,.nav-item.active{background:var(--bg);color:var(--text)}.nav-item.active{background:var(--text);color:#f6f7ed;font-weight:600}.nav-item.active svg{stroke:#f6f7ed!important}.nav-badge{margin-left:auto;background:var(--text);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}.nav-item.active .nav-badge{background:rgba(255,255,255,.25)}.nav-arrow{margin-left:auto;font-size:11px;opacity:.35}.sidebar-footer{margin-top:auto;padding:14px 16px 0;border-top:1px solid var(--border)}.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-sm);cursor:pointer}.user-card:hover{background:var(--bg)}.avatar{width:32px;height:32px;background:var(--text);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#f6f7ed;font-size:12px;font-weight:700;flex-shrink:0}.user-name{font-weight:700;font-size:13px}.user-role{font-size:11px;color:var(--muted);font-weight:400}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:62px;display:flex;align-items:center;gap:16px;flex-shrink:0;position:sticky;top:0;z-index:10}.topbar-left{flex:1}.topbar-title{font-size:18px;font-weight:800;letter-spacing:-.5px}.topbar-subtitle{font-size:12px;color:var(--muted);font-weight:400;margin-top:1px}.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 12px;width:248px}.search-box input{border:none;background:transparent;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--text);outline:none;flex:1}.search-box input::placeholder{color:var(--subtle);font-weight:400}.kbd{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--subtle)}.topbar-actions{display:flex;align-items:center;gap:8px}.icon-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative}.icon-btn:hover{background:var(--bg);border-color:#ccc}.notif-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;background:#e74c3c;border-radius:50%;border:1.5px solid #fff}
.content{padding:22px 28px;flex:1}.page-transition{animation:fadeUp .2s ease}.date-row{display:flex;align-items:center;justify-content:flex-end;margin-bottom:18px;font-size:12.5px;color:var(--muted);font-weight:500;gap:6px}.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 18px 16px;transition:box-shadow .2s;cursor:default}.stat-card:hover{box-shadow:var(--shadow-md)}.stat-card.dark{background:var(--text);border-color:var(--text);color:#f6f7ed}.stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.stat-icon-wrap{width:36px;height:36px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center}.dark .stat-icon-wrap{background:rgba(255,255,255,.12)}.stat-more{font-size:18px;opacity:.3;cursor:pointer;font-weight:700;line-height:1}.stat-value{font-size:23px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:5px}.stat-label{font-size:12.5px;color:var(--muted);margin-bottom:10px;font-weight:400}.dark .stat-label{color:rgba(255,255,255,.45)}.stat-delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:20px}.stat-delta.up{background:var(--green-light);color:var(--green)}.stat-delta.down{background:var(--red-light);color:var(--red)}.dark .stat-delta.up{background:rgba(58,125,68,.28);color:#7dcb88}.dark .stat-delta.down{background:rgba(192,57,43,.28);color:#e87b6e}.mid-row{display:grid;grid-template-columns:1fr .72fr .58fr;gap:14px;margin-bottom:18px}.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;transition:box-shadow .2s}.card:hover{box-shadow:var(--shadow-md)}.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.card-title{font-size:14.5px;font-weight:700;letter-spacing:-.3px}.card-action{font-size:12.5px;color:var(--muted);cursor:pointer;font-weight:500}.card-action:hover{color:var(--text)}.chart-wrap{position:relative;height:140px}.donut-wrap{display:flex;align-items:center;gap:20px}.donut-canvas-wrap{position:relative;flex-shrink:0}.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}.donut-center .val{font-size:13px;font-weight:800;letter-spacing:-.5px}.donut-center .lbl{font-size:9.5px;color:var(--muted);font-weight:400}.legend{display:flex;flex-direction:column;gap:8px}.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:500}.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.legend-pct{margin-left:auto;font-weight:700;color:var(--text);font-size:12.5px;min-width:30px;text-align:right}.rank-list{display:flex;flex-direction:column;gap:2px}.rank-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer}.rank-item:hover{background:var(--bg)}.rank-num{width:18px;font-size:12px;font-weight:800;color:var(--subtle);flex-shrink:0}.rank-bar-wrap{flex:1}.rank-name{font-size:13px;font-weight:600}.rank-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}.rank-count{font-size:12.5px;font-weight:700;flex-shrink:0}.bot-row{display:grid;grid-template-columns:.6fr 1fr 1fr;gap:14px;margin-bottom:18px}.inv-list{display:flex;flex-direction:column;gap:2px}.inv-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer}.inv-item:hover{background:var(--bg)}.inv-num{width:22px;height:22px;border-radius:6px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0}.inv-name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.inv-count{font-size:12.5px;font-weight:700;color:var(--muted)}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--subtle);padding:0 0 10px;text-align:left;border-bottom:1.5px solid var(--border)}.tbl td{padding:9px 0;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;font-weight:500}.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--bg)}.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}.badge.paid{background:var(--green-light);color:var(--green)}.quick-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.quick-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:13px 6px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;background:var(--surface)}.quick-btn:hover{border-color:var(--text);background:var(--text);color:#f6f7ed}.quick-btn:hover svg{stroke:#f6f7ed!important}.quick-icon-wrap{width:34px;height:34px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:background .15s}.quick-btn:hover .quick-icon-wrap{background:rgba(255,255,255,.15)}.quick-label{font-size:11px;font-weight:600;text-align:center}.sys-list{display:flex;flex-direction:column;gap:11px}.sys-row{display:flex;justify-content:space-between;align-items:center;font-size:13px}.sys-key{color:var(--muted);font-weight:400}.sys-val{font-weight:700}.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}select{font-family:inherit;font-size:12.5px;font-weight:600;border:1.5px solid var(--border);border-radius:7px;padding:5px 9px;background:var(--bg);color:var(--text);cursor:pointer;outline:none}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}.header-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}.btn{border:0;border-radius:8px;padding:10px 14px;font:inherit;font-weight:700;cursor:pointer}.btn.primary{background:var(--text);color:#fff}.btn.ghost{background:var(--bg);border:1px solid var(--border)}.table-wrap{overflow:auto}.tbl-books{width:100%;border-collapse:collapse;min-width:840px}.tbl-books th,.tbl-books td{padding:12px 0;border-bottom:1px solid var(--border);text-align:left;font-size:13px}.ok{background:var(--green-light);color:var(--green)}.bad{background:var(--red-light);color:var(--red)}.ops{display:flex;gap:8px}.link{border:0;background:none;font:inherit;font-weight:700;cursor:pointer;padding:0}.link.danger{color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(18,18,18,.45);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}.modal-overlay.open{display:flex;animation:fadeIn .18s ease}.modal{width:min(1120px,100%);max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);animation:popIn .22s ease;transform-origin:center}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border)}.modal-title{font-size:18px;font-weight:800}.close{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:20px}.modal-body{padding:20px 22px 10px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:7px}.field.full{grid-column:1/-1}.label{font-size:12px;font-weight:700;color:var(--muted)}.input,.select,.textarea{border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font:inherit;outline:0;background:#fff}.textarea{min-height:110px;resize:vertical}.input:focus,.select:focus,.textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(58,125,68,.08)}.helper{font-size:11px;color:var(--subtle)}.error .input,.error .select,.error .textarea{border-color:var(--red)}.error .helper,.error .label{color:var(--red)}.thumb{width:100%;height:170px;border:1.5px dashed var(--border);border-radius:14px;background:linear-gradient(180deg,#fff,#fafaf6);overflow:hidden;display:grid;place-items:center}.thumb img{width:100%;height:100%;object-fit:cover;display:none}.footer-actions{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px 22px;border-top:1px solid var(--border)}.loading .spin{display:inline-block}.spin{display:none;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite}.btn.loading .txt{display:none}.btn.loading{opacity:.85;pointer-events:none}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes popIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
.page-shell{display:none}.page-shell.active{display:block}.empty-state{padding:28px;border:1px dashed var(--border);border-radius:16px;background:rgba(255,255,255,.55);color:var(--muted)}
@media(max-width:1100px){.sidebar{display:none}.stats-grid{grid-template-columns:repeat(2,1fr)}.mid-row,.bot-row{grid-template-columns:1fr}.search-box{display:none}.grid{grid-template-columns:1fr}.tbl-books{min-width:760px}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f6f7ed" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>

      <div class="logo-text">BookHouse</div>
      <div class="logo-sub">Tri thức trong tầm tay</div>
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Quản lý</div>
    <div class="nav-item active" data-page="dashboard">

    </div>

      <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>

      Bán hàng

    <div class="nav-item" data-page="invoices">
      <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbarTitle">Tổng quan</div>
      <div class="topbar-subtitle" id="topbarSubtitle">Chào mừng bạn trở lại, Admin!</div>

    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b5b5ae" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

      <div class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888880" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot"></span></div>
      <div class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888880" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg></div>
    </div>
  </header>
  <div class="content" id="mainContent"></div>
</div>

saveStaff"><span class="txt">Lưu nhân viên</span><span class="spin"></span></button></div></form></div></div>

<template id="simple-template">
  <div class="page-shell page-transition active">
    <div class="empty-state" id="simpleState"></div>
  </div>
</template>

<script>
const pages = {
  dashboard: { title: 'Tổng quan', subtitle: 'Chào mừng bạn trở lại, Admin!', template: 'dashboard-template', afterRender: initDashboard },
  books: { title: 'Sách', subtitle: 'Quản lý toàn bộ đầu sách trong kho', template: 'books-template', afterRender: initBooks },
  categories: { title: 'Thể loại', subtitle: 'Quản lý thể loại sách', template: 'categories-template', afterRender: initCategories },
  customers: { title: 'Khách hàng', subtitle: 'Quản lý thông tin khách hàng', template: 'customers-template', afterRender: initCustomers },
  staff: { title: 'Nhân viên', subtitle: 'Quản lý nhân sự cửa hàng', template: 'staff-template', afterRender: initStaff },
  sales: { title: 'Bán hàng', subtitle: 'Giao diện bán hàng trực tiếp', template: 'simple-template', body: 'Trang Bán hàng đang được xây dựng.' },
  invoices: { title: 'Hóa đơn', subtitle: 'Danh sách hóa đơn và thanh toán', template: 'simple-template', body: 'Trang Hóa đơn đang được xây dựng.' },
  imports: { title: 'Nhập hàng', subtitle: 'Quản lý phiếu nhập và hàng về kho', template: 'simple-template', body: 'Trang Nhập hàng đang được xây dựng.' },
  revenue: { title: 'Doanh thu', subtitle: 'Báo cáo doanh thu và phân tích', template: 'simple-template', body: 'Trang Doanh thu đang được xây dựng.' },
  inventory: { title: 'Tồn kho', subtitle: 'Theo dõi trạng thái tồn kho', template: 'simple-template', body: 'Trang Tồn kho đang được xây dựng.' },
  settings: { title: 'Cài đặt', subtitle: 'Thiết lập hệ thống và phân quyền', template: 'simple-template', body: 'Trang Cài đặt đang được xây dựng.' }
};

const mainContent = document.getElementById('mainContent');
const topbarTitle = document.getElementById('topbarTitle');
const topbarSubtitle = document.getElementById('topbarSubtitle');
const sidebar = document.querySelector('.sidebar');

function renderPage(pageName) {
  const page = pages[pageName] || pages.dashboard;
  document.querySelectorAll('.nav-item[data-page]').forEach(item => {
    item.classList.toggle('active', item.dataset.page === pageName);
  });
  topbarTitle.textContent = page.title;
  topbarSubtitle.textContent = page.subtitle;
  mainContent.innerHTML = document.getElementById(page.template).innerHTML;
  requestAnimationFrame(() => {
    const activeShell = mainContent.querySelector('.page-shell');
    if (activeShell) activeShell.classList.add('active');
  });
  if (page.template === 'simple-template') {
    const empty = document.getElementById('simpleState');
    if (empty) empty.textContent = page.body;
  }
  if (typeof page.afterRender === 'function') page.afterRender();
}

function handleNavigationClick(event) {
  const navItem = event.target.closest('.nav-item[data-page]');
  if (!navItem || !sidebar.contains(navItem)) return;
  event.preventDefault();
  renderPage(navItem.dataset.page);
}

sidebar.addEventListener('click', handleNavigationClick);

function initDashboard() {
  const lineChart = document.getElementById('lineChart');
  if (lineChart) {
    const dpr = window.devicePixelRatio || 1;
    const wrap = lineChart.parentElement;
    const W = wrap.clientWidth, H = 140;
    lineChart.width = W * dpr; lineChart.height = H * dpr;
    lineChart.style.width = W + 'px'; lineChart.style.height = H + 'px';
    const ctx = lineChart.getContext('2d');
    ctx.scale(dpr, dpr);
    const data = [9.8, 12.5, 10.2, 16.8, 13.4, 18.9, 24.5];
    const labels = ['04/05','05/05','06/05','07/05','08/05','09/05','10/05'];
    const pad = { t: 10, r: 10, b: 28, l: 38 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
    const min = 0, max = 28;
    const px = i => pad.l + (i / (data.length - 1)) * cw;
    const py = v => pad.t + ch - ((v - min) / (max - min)) * ch;
    ctx.strokeStyle = '#e8e8e2'; ctx.lineWidth = 1;
    [0, 5, 10, 15, 20, 25].forEach(v => { const y = py(v); ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke(); ctx.fillStyle = '#b5b5ae'; ctx.font = '600 10px DM Sans, sans-serif'; ctx.textAlign = 'right'; ctx.fillText(v + 'M', pad.l - 5, y + 3.5); });
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch); grad.addColorStop(0, 'rgba(31,31,31,0.1)'); grad.addColorStop(1, 'rgba(31,31,31,0)');
    ctx.beginPath(); ctx.moveTo(px(0), py(data[0])); for (let i = 1; i < data.length; i++) { const xc = (px(i) + px(i-1)) / 2; ctx.bezierCurveTo(xc, py(data[i-1]), xc, py(data[i]), px(i), py(data[i])); } ctx.lineTo(px(data.length-1), py(0)); ctx.lineTo(px(0), py(0)); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0), py(data[0])); for (let i = 1; i < data.length; i++) { const xc = (px(i) + px(i-1)) / 2; ctx.bezierCurveTo(xc, py(data[i-1]), xc, py(data[i]), px(i), py(data[i])); } ctx.strokeStyle = '#1f1f1f'; ctx.lineWidth = 2.2; ctx.stroke();
    data.forEach((v, i) => { ctx.beginPath(); ctx.arc(px(i), py(v), 4.5, 0, Math.PI*2); ctx.fillStyle = '#1f1f1f'; ctx.fill(); ctx.beginPath(); ctx.arc(px(i), py(v), 2.5, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill(); });
    ctx.fillStyle = '#b5b5ae'; ctx.font = '600 10px DM Sans, sans-serif'; ctx.textAlign = 'center'; labels.forEach((l, i) => ctx.fillText(l, px(i), H - 5));
  }
  const donutChart = document.getElementById('donutChart');
  if (donutChart) {
    const dpr = window.devicePixelRatio || 1; donutChart.width = 120 * dpr; donutChart.height = 120 * dpr; donutChart.style.width = '120px'; donutChart.style.height = '120px'; const ctx = donutChart.getContext('2d'); ctx.scale(dpr, dpr); const data = [35, 20, 15, 10, 20]; const colors = ['#1f1f1f','#555555','#888880','#b5b5ae','#e0e0da']; const cx = 60, cy = 60, r = 52, inner = 34; let start = -Math.PI / 2; data.forEach((v, i) => { const angle = (v / 100) * Math.PI * 2; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, start + angle); ctx.closePath(); ctx.fillStyle = colors[i]; ctx.fill(); start += angle; }); ctx.beginPath(); ctx.arc(cx, cy, inner, 0, Math.PI*2); ctx.fillStyle = '#ffffff'; ctx.fill();
  }
}

function initBooks() {
  const overlay = document.getElementById('modalOverlay');
  const openBtn = document.getElementById('btnAddBook');
  const closeBtn = document.getElementById('modalClose');
  const cancelBtn = document.getElementById('cancelBook');
  const form = document.getElementById('bookForm');
  const saveBtn = document.getElementById('saveBook');
  const preview = document.getElementById('bookPreview');
  if (!overlay || !openBtn || !form) return;
  const closeModal = () => overlay.classList.remove('open');
  openBtn.onclick = () => overlay.classList.add('open');
  closeBtn.onclick = closeModal; cancelBtn.onclick = closeModal;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };
  form.image.addEventListener('change', e => { const f = e.target.files[0]; if (!f) return; const url = URL.createObjectURL(f); preview.src = url; preview.style.display = 'block'; preview.nextElementSibling.style.display = 'none'; });
  form.onsubmit = e => { e.preventDefault(); const title = form.title.value.trim(), price = +form.price.value, stock = +form.stock.value, year = +form.year.value; let ok = true; [...form.querySelectorAll('.field')].forEach(f => f.classList.remove('error')); const mark = (name, msg) => { const el = form.elements[name].closest('.field'); el.classList.add('error'); const helper = el.querySelector('.helper'); if (helper) helper.textContent = msg; ok = false; }; if (!title) mark('title', 'Tên sách không được để trống'); if (!(price > 0)) mark('price', 'Giá phải lớn hơn 0'); if (!(stock >= 0)) mark('stock', 'Số lượng phải >= 0'); const y = new Date().getFullYear(); if (!(year >= 1900 && year <= y + 1)) mark('year', 'Năm xuất bản không hợp lệ'); if (!form.category.value) mark('category', 'Vui lòng chọn thể loại'); if (!form.publisher.value) mark('publisher', 'Vui lòng chọn nhà xuất bản'); if (!form.author.value) mark('author', 'Vui lòng chọn tác giả'); if (!ok) return; saveBtn.classList.add('loading'); setTimeout(() => { saveBtn.classList.remove('loading'); closeModal(); form.reset(); preview.removeAttribute('src'); preview.style.display = 'none'; preview.nextElementSibling.style.display = 'block'; showToast('Đã lưu sách mới'); }, 900); };
}

function initCategories() {
  const state = {
    items: [
      { name: 'Kinh tế', description: 'Sách về kinh doanh và tài chính', status: 'Hoạt động' },
      { name: 'Tâm lý', description: 'Sách phát triển bản thân', status: 'Hoạt động' },
      { name: 'Văn học', description: 'Tác phẩm văn học chọn lọc', status: 'Hoạt động' },
      { name: 'Thiếu nhi', description: 'Sách cho trẻ em', status: 'Hoạt động' }
    ]
  };
  const modal = document.getElementById('categoryModal');
  const openBtn = document.getElementById('btnAddCategory');
  const closeBtn = document.getElementById('closeCategoryModal');
  const cancelBtn = document.getElementById('cancelCategory');
  const form = document.getElementById('categoryForm');
  const tableBody = document.getElementById('categoryTableBody');
  const search = document.getElementById('categorySearch');
  if (!modal || !openBtn || !form || !tableBody) return;

  const render = (filter = '') => {
    const q = filter.trim().toLowerCase();
    const rows = state.items.filter(i => !q || i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q));
    tableBody.innerHTML = rows.length ? rows.map((item, index) => `
      <tr>
        <td>${index + 1}</td>
        <td style="font-weight:700">${item.name}</td>
        <td style="color:var(--muted)">${item.description}</td>
        <td><span class="badge paid">${item.status}</span></td>
        <td><div class="ops"><button class="link">Sửa</button><button class="link danger">Xóa</button></div></td>
      </tr>
    `).join('') : `<tr><td colspan="5"><div class="empty-state">Không tìm thấy thể loại phù hợp.</div></td></tr>`;
  };

  const closeModal = () => { modal.classList.remove('open'); form.reset(); form.querySelector('.field').classList.remove('error'); };
  openBtn.onclick = () => modal.classList.add('open');
  closeBtn.onclick = closeModal; cancelBtn.onclick = closeModal;
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  search.oninput = e => render(e.target.value);
  form.onsubmit = e => {
    e.preventDefault();
    const name = form.name.value.trim();
    const desc = form.description.value.trim();
    const field = form.name.closest('.field');
    const helper = field.querySelector('.helper');
    field.classList.remove('error');
    helper.textContent = 'Nhập tên thể loại';
    if (!name) {
      field.classList.add('error');
      helper.textContent = 'Tên thể loại không được để trống';
      return;
    }
    state.items.unshift({ name, description: desc || '—', status: 'Hoạt động' });
    render(search.value);
    closeModal();
    showToast('Đã thêm thể loại');
  };

  render();
}

function initCustomers() {
  const state = {
    items: [
      { name: 'Nguyễn Văn An', phone: '0901234567', email: 'an@gmail.com', orders: 18, points: 1240, tier: 'VIP', status: 'Hoạt động', avatar: 'A' },
      { name: 'Trần Thị Mai', phone: '0912345678', email: 'mai@gmail.com', orders: 9, points: 680, tier: 'Gold', status: 'Hoạt động', avatar: 'M' },
      { name: 'Lê Hoàng Nam', phone: '0987654321', email: 'nam@gmail.com', orders: 5, points: 320, tier: 'Silver', status: 'Hoạt động', avatar: 'N' },
      { name: 'Phạm Minh Thư', phone: '0933123456', email: 'thu@gmail.com', orders: 2, points: 90, tier: 'Bronze', status: 'Bị khóa', avatar: 'T' }
    ]
  };
  const tableBody = document.getElementById('customerTableBody');
  const emptyState = document.getElementById('customerEmptyState');
  const modal = document.getElementById('customerModal');
  const form = document.getElementById('customerForm');
  const search = document.getElementById('customerSearch');
  const preview = document.getElementById('customerPreview');
  const openBtn = document.getElementById('btnAddCustomer');
  const closeBtn = document.getElementById('closeCustomerModal');
  const cancelBtn = document.getElementById('cancelCustomer');
  if (!tableBody || !modal || !form) return;

  const badgeClass = tier => ({ Bronze:'badge ok', Silver:'badge paid', Gold:'badge ok', VIP:'badge paid' }[tier] || 'badge paid');
  const render = (q = '') => {
    const query = q.trim().toLowerCase();
    const rows = state.items.filter(x => !query || x.name.toLowerCase().includes(query) || x.phone.includes(query) || x.email.toLowerCase().includes(query));
    tableBody.innerHTML = rows.length ? rows.map((item, idx) => `
      <tr>
        <td>${idx + 1}</td>
        <td><div class="avatar">${item.avatar}</div></td>
        <td style="font-weight:700">${item.name}</td>
        <td>${item.phone}</td>
        <td style="color:var(--muted)">${item.email}</td>
        <td>${item.orders}</td>
        <td>${item.points}</td>
        <td><span class="badge ${item.tier === 'VIP' ? 'paid' : 'ok'}">${item.tier}</span></td>
        <td><span class="badge ${item.status === 'Hoạt động' ? 'paid' : 'bad'}">${item.status}</span></td>
        <td><div class="ops"><button class="link js-view-customer" data-name="${item.name}">Xem chi tiết</button><button class="link">Sửa</button><button class="link danger">Xóa</button></div></td>
      </tr>
    `).join('') : '';
    emptyState.style.display = rows.length ? 'none' : 'block';
  };

  const closeModal = () => { modal.classList.remove('open'); form.reset(); preview.removeAttribute('src'); preview.style.display='none'; preview.nextElementSibling.style.display='block'; };
  openBtn.onclick = () => modal.classList.add('open');
  closeBtn.onclick = closeModal; cancelBtn.onclick = closeModal;
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  search.oninput = e => render(e.target.value);
  form.avatar.addEventListener('change', e => { const f = e.target.files[0]; if (!f) return; preview.src = URL.createObjectURL(f); preview.style.display='block'; preview.nextElementSibling.style.display='none'; });
  form.onsubmit = e => {
    e.preventDefault();
    const name = form.name.value.trim();
    const phone = form.phone.value.trim();
    const email = form.email.value.trim();
    const nameField = form.name.closest('.field');
    const phoneField = form.phone.closest('.field');
    const emailField = form.email.closest('.field');
    [nameField, phoneField, emailField].forEach(f => f.classList.remove('error'));
    let ok = true;
    const phoneOk = /^(0[3|5|7|8|9])[0-9]{8}$/.test(phone);
    const emailOk = /^\S+@\S+\.\S+$/.test(email);
    if (!name) { nameField.classList.add('error'); nameField.querySelector('.helper').textContent = 'Tên không được để trống'; ok = false; }
    if (!phoneOk) { phoneField.classList.add('error'); phoneField.querySelector('.helper').textContent = 'SĐT phải đúng định dạng'; ok = false; }
    if (!emailOk) { emailField.classList.add('error'); emailField.querySelector('.helper').textContent = 'Email không hợp lệ'; ok = false; }
    if (!ok) return;
    state.items.unshift({ name, phone, email, orders: 0, points: 0, tier: form.tier.value, status: 'Hoạt động', avatar: (name[0] || 'C').toUpperCase() });
    render(search.value);
    closeModal();
    showToast('Đã thêm khách hàng');
  };

  tableBody.addEventListener('click', e => {
    const btn = e.target.closest('.js-view-customer');
    if (!btn) return;
    alert('Chi tiết khách hàng: ' + btn.dataset.name);
  });

  render();
}

function initStaff() {
  const state = {
    items: [
      { name:'Nguyễn Văn Hùng', code:'NV001', role:'Quản lý', email:'hung@bookhouse.vn', phone:'0901111111', shift:'Hành chính', status:'Đang làm', avatar:'H' },
      { name:'Trần Thị Lan', code:'NV002', role:'Thu ngân', email:'lan@bookhouse.vn', phone:'0902222222', shift:'Sáng', status:'Đang làm', avatar:'L' },
      { name:'Phạm Minh Tuấn', code:'NV003', role:'Nhân viên bán hàng', email:'tuan@bookhouse.vn', phone:'0903333333', shift:'Chiều', status:'Nghỉ phép', avatar:'T' },
      { name:'Lê Thu Hà', code:'NV004', role:'Kho', email:'ha@bookhouse.vn', phone:'0904444444', shift:'Tối', status:'Đã nghỉ việc', avatar:'H' }
    ]
  };
  const modal = document.getElementById('staffModal');
  const form = document.getElementById('staffForm');
  const tableBody = document.getElementById('staffTableBody');
  const search = document.getElementById('staffSearch');
  const positionFilter = document.getElementById('positionFilter');
  const preview = document.getElementById('staffPreview');
  const openBtn = document.getElementById('btnAddStaff');
  const closeBtn = document.getElementById('closeStaffModal');
  const cancelBtn = document.getElementById('cancelStaff');
  if (!modal || !form || !tableBody) return;

  const render = () => {
    const q = search.value.trim().toLowerCase();
    const roleFilter = positionFilter.value;
    const rows = state.items.filter(x => (!q || x.name.toLowerCase().includes(q) || x.code.toLowerCase().includes(q) || x.email.toLowerCase().includes(q)) && (!roleFilter || x.role === roleFilter));
    tableBody.innerHTML = rows.length ? rows.map((item, idx) => `
      <tr>
        <td>${idx + 1}</td>
        <td><div class="avatar">${item.avatar}</div></td>
        <td style="font-weight:700">${item.name}</td>
        <td>${item.code}</td>
        <td>${item.role}</td>
        <td style="color:var(--muted)">${item.email}</td>
        <td>${item.phone}</td>
        <td>${item.shift}</td>
        <td><span class="badge ${item.status === 'Đang làm' ? 'paid' : item.status === 'Nghỉ phép' ? 'ok' : 'bad'}">${item.status}</span></td>
        <td><div class="ops"><button class="link js-view-staff" data-name="${item.name}">Xem hồ sơ</button><button class="link">Sửa</button><button class="link danger">Xóa</button></div></td>
      </tr>
    `).join('') : `<tr><td colspan="10"><div class="empty-state">Không tìm thấy nhân viên phù hợp.</div></td></tr>`;
  };

  const closeModal = () => { modal.classList.remove('open'); form.reset(); preview.removeAttribute('src'); preview.style.display='none'; preview.nextElementSibling.style.display='block'; };
  openBtn.onclick = () => modal.classList.add('open');
  closeBtn.onclick = closeModal; cancelBtn.onclick = closeModal;
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  search.oninput = render; positionFilter.onchange = render;
  form.avatar.addEventListener('change', e => { const f = e.target.files[0]; if (!f) return; preview.src = URL.createObjectURL(f); preview.style.display='block'; preview.nextElementSibling.style.display='none'; });
  form.onsubmit = e => {
    e.preventDefault();
    let ok = true;
    ['name','code','email','phone'].forEach(name => { const field = form.elements[name].closest('.field'); field.classList.remove('error'); field.querySelector('.helper').textContent = field.querySelector('.helper').dataset.base || field.querySelector('.helper').textContent; });
    const emailOk = /^\S+@\S+\.\S+$/.test(form.email.value.trim());
    const phoneOk = /^(0[3|5|7|8|9])[0-9]{8}$/.test(form.phone.value.trim());
    if (!form.name.value.trim()) { markField(form.name, 'Không được để trống'); ok = false; }
    if (!form.code.value.trim()) { markField(form.code, 'Không được để trống'); ok = false; }
    if (!emailOk) { markField(form.email, 'Email không hợp lệ'); ok = false; }
    if (!phoneOk) { markField(form.phone, 'SĐT đúng định dạng'); ok = false; }
    if (!ok) return;
    state.items.unshift({ name: form.name.value.trim(), code: form.code.value.trim(), role: form.role.value, email: form.email.value.trim(), phone: form.phone.value.trim(), shift: form.shift.value || 'Chưa phân ca', status: 'Đang làm', avatar: (form.name.value.trim()[0] || 'E').toUpperCase() });
    render();
    closeModal();
    showToast('Đã thêm nhân viên');
  };

  tableBody.addEventListener('click', e => {
    const btn = e.target.closest('.js-view-staff');
    if (!btn) return;
    alert('Hồ sơ nhân viên: ' + btn.dataset.name);
  });

  function markField(input, message) {
    const field = input.closest('.field');
    field.classList.add('error');
    field.querySelector('.helper').textContent = message;
  }

  render();
}

function showToast(message) {
  let toast = document.getElementById('appToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'appToast';
    toast.style.cssText = 'position:fixed;right:20px;bottom:20px;background:#1f1f1f;color:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,.18);z-index:999;opacity:0;transform:translateY(8px);transition:.2s';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  requestAnimationFrame(() => { toast.style.opacity = '1'; toast.style.transform = 'translateY(0)'; });
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(8px)'; }, 2200);
}

window.addEventListener('resize', () => { const current = document.querySelector('.nav-item.active')?.dataset.page || 'dashboard'; renderPage(current); });
renderPage('dashboard');
</script>
</body>
